<section class="blog-detail-page">

    <!-- PROGRESS BAR -->
    <div class="reading-progress">
        <div class="progress-bar" [style.width.%]="scrollProgress">
        </div>
    </div>

    <!-- HERO -->
    <section class="blog-hero">

        <div class="container">

            <div class="hero-content">
                <div class="back-btn">
                    <a routerLink="/blogs">
                        ← Back to Blogs
                    </a>
                </div>

                <span class="blog-category">
                    {{ blog?.category }}
                </span>

                <h1>
                    {{ blog?.title }}
                </h1>

                <p class="blog-subtitle">
                    {{ blog?.description }}
                </p>

                <div class="blog-meta">

                    <div class="author-info">

                        <img src="assets/images/my-pic.png" alt="Author">

                        <div>
                            <h4>Punitha</h4>
                            <span>May 26, 2026 · 8 min read</span>
                        </div>

                    </div>
                </div>

            </div>

            <div>
                <img class="cover-image" [src]="blog?.image" alt="blog?.title">
            </div>

        </div>

    </section>

    <!-- CONTENT -->
    <section class="blog-content-section">

        <div class="container content-layout">

            <article class="blog-content">

                <ng-container *ngFor="let block of blog?.content; let i = index">

                    <!-- ✅ ADDED [id] for scroll target -->
                    <h2 *ngIf="block.type === 'heading'" [id]="'section-' + i">
                        {{ block.title }}
                    </h2>

                    <p *ngIf="block.type === 'paragraph'">
                        {{ block.text }}
                    </p>

                    <ul *ngIf="block.type === 'list'" class="styled-list">
                        <li *ngFor="let item of block.items">
                            {{ item }}
                        </li>
                    </ul>

                </ng-container>

            </article>

            <!-- SIDEBAR -->
            <aside class="blog-sidebar">

                <!-- TABLE OF CONTENT -->
                <div class="sidebar-card">

                    <h3>
                        Contents
                    </h3>

                    <ul>

                        <li *ngFor="let block of blog?.content; let i = index">

                            <a
                                *ngIf="block.type === 'heading'"
                                (click)="scrollToSection('section-' + i)"
                                [class.active]="activeSectionId === 'section-' + i">
                                {{ block.title }}
                            </a>

                        </li>

                    </ul>

                </div>

                <!-- SHARE CARD -->
                <div class="sidebar-card share-card">

                    <h3>
                        Share Blog
                    </h3>

                    <button (click)="shareBlog()">
                        Copy Blog Link
                    </button>

                </div>

            </aside>

        </div>

    </section>

</section>
