<section class="projects-page">

    <div class="container">

        <!-- SECTION HEADER -->

        <div class="section-title">

            <h1>
                My Projects
            </h1>

            <p>
                A curated collection of UI/UX, branding,
                product and mobile app design works.
            </p>

        </div>

        <!-- CATEGORY FILTER -->

        <div class="filter-wrapper">

            <button class="filter-btn" [class.active]="selectedCategory === 'All'" (click)="filterProjects('All')">

                All

            </button>

            <button class="filter-btn" *ngFor="let category of categories"
                [class.active]="selectedCategory === category" (click)="filterProjects(category)">

                {{ category }}

            </button>

        </div>

        <!-- PROJECT GRID -->

        <div class="projects-grid">

            <div class="project-card" *ngFor="let project of filteredProjects">

                <!-- IMAGE -->

                <div class="project-image">

                    <img [src]="project.icon" alt="project.title">

                </div>

                <!-- CONTENT -->

                <div class="project-content">

                    <span class="project-tag">
                        {{ project.category }}
                    </span>

                    <h3>
                        {{ project.title }}
                    </h3>

                    <p>
                        {{ project.description }}
                    </p>

                    <a [routerLink]="['/project', project.id]">

                        View Project →

                    </a>

                </div>

            </div>

        </div>

    </div>

</section>
