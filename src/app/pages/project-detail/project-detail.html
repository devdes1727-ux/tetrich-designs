<section class="project-detail-page">

    <!-- HERO -->

    <section class="project-hero">

        <div class="container">

            <div class="hero-content">

                <div>

                    <a routerLink="/projects" class="back-btn"> ← Back</a>

                    <span class="project-label">
                        {{ project?.category || 'UI/UX Case Study' }}
                    </span>

                    <h1>
                        {{ project?.title || ('Project ' + projectId) }}
                    </h1>

                    <p>
                        {{ project?.description || 'A modern user-centered digital experience focused on usability,
                        accessibility and clean interaction design.' }}
                    </p>

                </div>

                <div class="hero-image">

                    <img [src]="project?.thumbImage || 'assets/images/default-thumb.jpg'"
                        [alt]="project?.title || 'Project Preview'" title="{{ project?.title || 'Project Preview' }}">

                </div>

            </div>

        </div>

    </section>

    <!-- OVERVIEW -->

    <section class="project-section">

        <div class="container">

            <img *ngFor="let image of project?.images" [src]="image" alt="project?.title || 'Project overview'"
                [title]="project?.title || 'Project overview'" class="section-icon">

        </div>

    </section>

</section>
