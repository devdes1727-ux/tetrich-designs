<div class="products-page">

  <!-- Background Decorations -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <!-- Header -->
  <section class="hero-section">
    <h1>
      Premium Digital Products
    </h1>

    <p>
      Elevate your projects with our collection of high-quality,
      meticulously crafted digital assets designed for modern creators.
    </p>
  </section>

  <!-- Products Grid -->
  <section class="products-grid">

    <div *ngFor="let product of products" class="product-card">

      <!-- Image -->
      <div class="product-image">

        <img [src]="product.image" alt="product.title" />

        <div class="category-badge">
          {{ product.category }}
        </div>

      </div>

      <!-- Content -->
      <div class="product-content">

        <div class="product-top">

          <h3>
            {{ product.title }}
          </h3>

          <div class="rating-box">

            <svg class="star-icon" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
              </path>
            </svg>

            <span>
              {{ product.rating }}
            </span>

          </div>

        </div>

        <p class="description">
          {{ product.description }}
        </p>

        <!-- Tags -->
        <div class="tags">

          <span *ngFor="let tag of product.tags" class="tag">
            {{ tag }}
          </span>

        </div>

        <!-- Footer -->
        <div class="product-footer">

          <div class="price">
            ${{ product.price }}
          </div>

          <a [routerLink]="['/products', product.id]" class="access-btn">
            <span>
              Get Access
            </span>

            <svg class="arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
            </svg>

          </a>

        </div>

      </div>

    </div>

  </section>

</div>
