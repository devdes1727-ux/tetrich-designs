<footer class="footer">
    <div class="footer-container">

        <!-- Brand -->
        <div class="footer-brand">
            <img src="assets/images/logo-w.png" alt="logo" class="footer-logo" />
            <p>
                Crafting modern digital experiences with clean UI, thoughtful UX,
                and impactful brand design.
            </p>
        </div>

        <!-- Navigation -->
        <div class="footer-links">
            <h3>Quick Links</h3>
            <ul>
                <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
                <li><a routerLink="/projects" routerLinkActive="active">Projects</a></li>
                <li><a routerLink="/services" routerLinkActive="active">Services</a></li>
                <li><a routerLink="/products" routerLinkActive="active">Products</a></li>
                <li><a routerLink="/blogs" routerLinkActive="active">Blogs</a></li>
                <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
            </ul>
        </div>

        <!-- Social -->
        <div class="footer-social">
            <h3>Connect</h3>

            <div class="social-icons">
                <a href="#" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>

                <a href="#" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="#" aria-label="Behance">
                    <i class="fab fa-behance"></i>
                </a>

                <a href="#" aria-label="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>
            </div>
        </div>

    </div>

    <!-- Bottom -->
    <div class="footer-bottom">
        <p>© 2026 tetrichdesigns. Designed by Punitha.</p>
    </div>
</footer>
