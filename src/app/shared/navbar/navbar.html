<header class="navbar">

  <div class="navbar-container">

    <!-- Logo -->
    <div class="logo">
      <img src="assets/images/logo-b.png" alt="logo" />
    </div>

    <!-- Desktop Menu -->
    <nav class="desktop-menu">

      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/blogs" routerLinkActive="active">Blogs</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>

      <!-- Dark Mode Button -->
      <button (click)="toggleDarkMode()" class="dark-btn">
        🌙
      </button>

      <!-- Resume Button -->
      <button class="resume-btn">
        Resume Download
      </button>

      <!-- Hire Me Button -->
      <button class="hire-btn">
        Hire Me
      </button>

      <!-- Cart Button -->
      <a routerLink="/cart" class="relative hover:text-orange-600 transition-colors cursor-pointer mr-4" title="Cart">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <span *ngIf="cartService.cartCount() > 0" class="absolute -top-2 -right-2 bg-orange-600 text-white rounded-full h-5 w-5 flex items-center justify-center text-xs font-bold shadow-sm">
          {{ cartService.cartCount() }}
        </span>
      </a>
      
    </nav>

    <!-- Mobile Menu Button -->
    <button class="mobile-toggle" (click)="toggleMenu()">
      ☰
    </button>

  </div>


  <!-- Mobile Menu -->
  <div *ngIf="isMenuOpen" class="mobile-menu">

    <a routerLink="/">Home</a>
    <a routerLink="/services">Services</a>
    <a routerLink="/products">Products</a>
    <a routerLink="/blogs">Blogs</a>
    <a routerLink="/contact">Contact</a>
    <a routerLink="/cart">Cart ({{ cartService.cartCount() }})</a>

    <button class="resume-btn mobile-btn">
      Resume Download
    </button>

    <button class="hire-btn mobile-btn">
      Hire Me
    </button>

  </div>

</header>
